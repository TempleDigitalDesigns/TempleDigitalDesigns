<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
            url('background.jpg');
            background-size:cover;
            background-position:center;
            overflow:hidden;
        }

        .success-box{
            width:90%;
            max-width:420px;
            background:rgba(255,255,255,0.96);
            padding:40px 30px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 10px 35px rgba(0,0,0,0.35);
            animation:popUp 0.8s ease;
        }

        @keyframes popUp{
            from{ transform:scale(0.5); opacity:0; }
            to{ transform:scale(1); opacity:1; }
        }

        .checkmark{
            width:100px;
            height:100px;
            background:linear-gradient(to right,#00c853,#43a047);
            border-radius:50%;
            margin:0 auto 20px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:50px;
            color:white;
            animation:bounce 1s infinite alternate;
        }

        @keyframes bounce{
            from{ transform:translateY(0); }
            to{ transform:translateY(-8px); }
        }

        h1{
            color:#001d4a;
            font-size:32px;
            margin-bottom:15px;
        }

        p{
            color:#555;
            font-size:16px;
            line-height:1.6;
            margin-bottom:15px;
        }

        /* 🔥 Formspree message style */
        .form-message{
            font-size:13px;
            color:#2e7d32;
            margin-bottom:20px;
            background:#e8f5e9;
            padding:10px;
            border-radius:10px;
            display:none;
        }

        .btn{
            display:inline-block;
            padding:14px 28px;
            border-radius:12px;
            text-decoration:none;
            background:linear-gradient(to right,#001d4a,#0b57d0);
            color:white;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

    <div class="success-box">

        <div class="checkmark">✓</div>

        <h1>Registration Successful 🎉</h1>

        <p>
            Enquiry received. you will be contacted via email soon 
        </p>

        <!-- 🔥 Formspree message appears here -->
        <div id="formMessage" class="form-message"></div>

        <a href="index.html" class="btn">Back To Home</a>

    </div>

    <script>
        // Get message from URL (Formspree redirect)
        const params = new URLSearchParams(window.location.search);
        const message = params.get("success") || params.get("message");

        const box = document.getElementById("formMessage");

        if (message) {
            box.textContent = message;
            box.style.display = "block";
        }
    </script>

</body>
</html>
